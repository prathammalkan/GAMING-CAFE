{% extends "base.html" %}

{% block title %}DEMON ZONE | Login{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="glass-card auth-card">
        <span class="eyebrow">Welcome back</span>
        <h1>Login to your player space</h1>
        <p>Access saved games, reviews, and a curated dashboard built around your taste.</p>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button-primary" type="submit">Login</button>
        </form>
        <p class="muted">No account yet? <a class="text-link" href="{% url 'signup' %}">Create one</a></p>
    </div>
</section>
{% endblock %}
